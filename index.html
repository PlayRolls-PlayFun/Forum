<!DOCTYPE html>
<html lang="ru">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">PlayFun</div>
        <nav>
          <ul>
            <li><a href="PlayFun-chat.html">Чат</a></li>
            <li class="dropdown">
              <a href="#games">Игры</a>
              <ul class="dropdown-content">
                <li><a href="games/blox-fruit.html">Блокс Фрукт</a></li>

              <a href="#" onclick="openProfile()">Профиль</a>

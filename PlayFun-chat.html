<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayFun - Чат</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">PlayFun</div>
        <nav>
          <ul>
            <ul>
                <li><a href="index.html">Главная</a></li>
              </ul>
            </li>
            <li class="dropdown">
              <a href="#" onclick="openProfile()">Профиль</a>
              <ul class="dropdown-content" id="profile-dropdown">
                <li><a href="#">Баланс: <span id="dropdown-balance">1000</span> Рублей</a></li>
                <li><a href="#">ID: <span id="dropdown-id">12345</span></a></li>
                <p>ID: <span id="profile-id">12345</span></p>
              </ul>
            </li>
          </ul>
        </nav>
      </header>

  <main>
    <section id="chat">
      <h2>Чат</h2>
      <div class="chat-container">
        <div class="chat-sidebar">
          <h3>Список чатов</h3>
          <ul class="chat-list" id="chat-list">
            <!-- Список чатов будет заполняться динамически -->
          </ul>
          <input type="text" placeholder="Поиск по ID" id="search-user" onkeypress="searchUser(event)">
        </div>
        <div class="chat-window">
          <div class="chat-header">
            <h3 id="chat-user-name">Выберите чат</h3>
          </div>
          <div class="messages" id="chat-messages">
            <!-- Сообщения чата -->
          </div>
          <input type="text" placeholder="Напишите сообщение..." id="chat-input" onkeypress="sendMessage(event)">
        </div>
      </div>
    </section>
  </main>

  <div id="profile-modal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeProfile()">&times;</span>
      <h2>Профиль</h2>
      <p>Баланс: <span id="user-balance">1000</span> Рублей</p>
    </div>
  </div>

  <footer>
    <p>&copy; 2023 PlayFun. Все права защищены.</p>
  </footer>

  <script src="scripts.js"></script>
</body>
</html>

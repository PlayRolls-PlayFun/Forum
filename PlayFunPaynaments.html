<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lilita+One&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Russo+One&display=swap" rel="stylesheet">
    <title>PlayFun Paynaments</title>
    <link rel="stylesheet" href="./css/styleForym.css">
    <link rel="stylesheet" type="text/css" href="./css/slick.css" />
    <link rel="stylesheet" type="text/css" href="./css/slick-theme.css" />
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <div class="image-container">
        <img src="./img/playFunicon (3).png" alt="icon" class="logo">
        <h1 id="text1">Paynaments</h1>
    </div>

    <form id="payment-form">
        <div class="form-group">
            <label for="amount">Сумма пополнения:</label>
            <input type="number" id="amount" name="amount" required>
        </div>
        <div class="form-group">
            <label for="fullname">Имя и фамилия (на латинице):</label>
            <input type="text" id="fullname" name="fullname" required>
        </div>
        <div id="card-element">
            <!-- Stripe Card Element будет здесь -->
        </div>
        <div id="card-errors" role="alert"></div>
        <button type="submit">Подтвердить</button>
    </form>

    <script>
        // Инициализация Stripe
        const stripe = Stripe('your-publishable-key'); // Замените на ваш ключ
        const elements = stripe.elements();
        const cardElement = elements.create('card');
        cardElement.mount('#card-element');

        const form = document.getElementById('payment-form');
        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const amount = document.getElementById('amount').value;
            const fullname = document.getElementById('fullname').value;

            // Создаем платежный метод
            const { error, paymentMethod } = await stripe.createPaymentMethod({
                type: 'card',
                card: cardElement,
                billing_details: {
                    name: fullname,
                },
            });

            if (error) {
                // Показываем ошибку
                const errorElement = document.getElementById('card-errors');
                errorElement.textContent = error.message;
            } else {
                // Отправляем данные на сервер для обработки платежа
                fetch('/process-payment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        paymentMethodId: paymentMethod.id,
                        amount: amount,
                        fullname: fullname,
                    }),
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = 'PlayFunPaynamentsReady.html';
                    } else {
                        alert('Ошибка при обработке платежа: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Ошибка:', error);
                });
            }
        });
    </script>
</body>
</html>
